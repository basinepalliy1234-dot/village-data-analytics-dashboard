<!DOCTYPE html>
<html>
<head>
    <title>Village Data Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Village Data Analytics Dashboard</h1>

<h2>Thogarakunta Village</h2>

<h3>Village Information Form</h3>

<form>
    <label>Name:</label><br>
    <input type="text"><br><br>

    <label>Mobile Number:</label><br>
    <input type="text"><br><br>

    <label>Village:</label><br>
    <input type="text"><br><br>

    <label>Issue/Need:</label><br>
    <input type="text"><br><br>

    <label>Priority:</label><br>
    <select>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
